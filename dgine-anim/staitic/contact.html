<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <link rel="stylesheet" href="css/style.css">

    <style>
        .contact {
            padding: 100px 8%;
        }

        .contact-form {
            max-width: 700px;
            margin: auto;
            background: #111827;
            padding: 30px;
            border-radius: 20px;
        }

        .contact-form input,
        .contact-form textarea {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
        }

        .contact-form button {
            width: 100%;
            padding: 15px;
            background: #00e5ff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <section class="contact">

        <div class="contact-form">

            <h2>Contact Us</h2>

            <input type="text" placeholder="Your Name">

            <input type="email" placeholder="Email">

            <textarea rows="5" placeholder="Message"></textarea>

            <button>
                Send Message
            </button>

        </div>

    </section>

</body>

</html>
