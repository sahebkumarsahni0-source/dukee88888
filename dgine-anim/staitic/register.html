<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <link rel="stylesheet" href="css/style.css">

    <style>
        .register-page {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .register-box {
            width: 450px;
            max-width: 100%;
            background: #111827;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0, 229, 255, .2);
        }

        .register-box h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .register-box input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
        }

        .register-box button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: #00e5ff;
            font-weight: bold;
            cursor: pointer;
        }
    </style>

</head>

<body>

    <section class="register-page">

        <div class="register-box">

            <h2>Create Account</h2>

            <input type="text" placeholder="Full Name">

            <input type="email" placeholder="Email">

            <input type="tel" placeholder="Phone Number">

            <input type="password" placeholder="Password">

            <input type="password" placeholder="Confirm Password">

            <button id="registerBtn">
                Create Account
            </button>

        </div>

    </section>
    <script type="module">

        import {
            auth
        }
            from "./firebase.js";

        import {
            createUserWithEmailAndPassword
        }
            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const btn =
            document.getElementById(
                "registerBtn"
            );

        btn.addEventListener("click", () => {

            const email =
                document.querySelectorAll(
                    "input"
                )[1].value;

            const password =
                document.querySelectorAll(
                    "input"
                )[3].value;

            createUserWithEmailAndPassword(
                auth,
                email,
                password
            )
                .then(() => {

                    alert("Account Created");

                })
                .catch(err => {

                    alert(err.message);

                });

        });
        import {
            doc,
            setDoc
        }
            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        import { db } from "./firebase.js";

        await setDoc(
            doc(db, "users", user.uid),
            {
                name: name,
                email: email,
                createdAt: new Date()
            }
        );
        import {
            addDoc,
            collection
        }
            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        await addDoc(
            collection(db, "orders"),
            {
                userId: user.uid,
                total: 2499,
                status: "Pending",
                createdAt: new Date()
            }
        );
        await addDoc(
            collection(db, "products"),
            {
                name: name,
                price: price,
                image: image,
                createdAt: new Date()
            }
        );

    </script>
</body>

</html>
