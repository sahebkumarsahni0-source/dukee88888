<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="css/style.css">

    <style>
        .login-page {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-box {
            width: 400px;
            max-width: 100%;
            background: #111827;
            padding: 35px;
            border-radius: 20px;
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
        }

        .login-box button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: #00e5ff;
            font-weight: bold;
            cursor: pointer;
        }
    </style>

</head>

<body>

    <section class="login-page">

        <div class="login-box">

            <h2>Login Account</h2>

            <input type="email" placeholder="Email">

            <input type="password" placeholder="Password">

            <button id="loginBtn">
                Login
            </button>

        </div>

    </section>
    <script type="module">

        import { auth }
            from "./firebase.js";

        import {
            signInWithEmailAndPassword
        }
            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        document
            .getElementById("loginBtn")
            .addEventListener("click", () => {

                const email =
                    document.querySelectorAll(
                        "input"
                    )[0].value;

                const password =
                    document.querySelectorAll(
                        "input"
                    )[1].value;

                signInWithEmailAndPassword(
                    auth,
                    email,
                    password
                )
                    .then(() => {

                        window.location =
                            "dashboard.html";

                    })
                    .catch(err => {

                        alert(err.message);

                    });

            });

    </script>
</body>

</html>
