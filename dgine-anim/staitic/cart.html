<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>

    <link rel="stylesheet" href="css/style.css">

    <style>
        .cart-page {
            padding: 100px 8%;
        }

        .cart-box {
            background: #111827;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #334155;
        }

        .checkout-btn {
            display: inline-block;
            padding: 15px 30px;
            background: #00e5ff;
            color: #000;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <header class="navbar">

        <div class="logo">DUKE CART</div>

        <nav>
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="cart.html">Cart</a>
        </nav>

    </header>

    <section class="cart-page">

        <h1>Shopping Cart</h1>

        <div class="cart-box" id="cartItems">


            <div class="cart-item">
                <span>Premium T-Shirt</span>
                <span>₹999</span>
            </div>

            <div class="cart-item">
                <span>Hoodie</span>
                <span>₹1499</span>
            </div>

            <div class="cart-item">
                <span>Total</span>
                <span>₹2498</span>
            </div>

        </div>

        <a href="checkout.html" class="checkout-btn">
            Proceed To Checkout
        </a>

    </section>

</body>
<script>

    let cart =
        JSON.parse(localStorage.getItem("cart")) || [];

    let container =
        document.getElementById("cartItems");

    let total = 0;

    cart.forEach(item => {

        total += item.price;

        container.innerHTML += `

<div class="cart-item">

<span>${item.name}</span>

<span>₹${item.price}</span>

</div>

`;

    });

    container.innerHTML += `

<div class="cart-item">

<strong>Total</strong>

<strong>₹${total}</strong>

</div>

`;

</script>

</html>
